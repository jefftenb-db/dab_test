bundle:
  name: dab_test

variables:
  py_lib_catalog:
    description: "UC catalog hosting python libraries (per env)"
  py_lib_schema:
    description: "UC schema hosting python libraries (per env)"
  app_name:
    description: "Databricks Apps name for this target"
  git_branch:
    description: "Git branch the app pulls source from"
    default: main

resources:
  apps:
    dab_test_app:
      name: ${var.app_name}
      description: "DAB demo app"
      git_repository:
        url: https://github.com/jefftenb-db/dab_test
        provider: github
      git_source:
        branch: ${var.git_branch}
        source_code_path: ./
      resources:
        - name: py_lib_volume
          uc_securable:
            securable_full_name: ${var.py_lib_catalog}.${var.py_lib_schema}.py_libs
            securable_type: VOLUME
            permission: READ_VOLUME

targets:
  dev:
    workspace:
      host: https://fevm-classic-stable-2te8jp.cloud.databricks.com
      profile: fevm-classic-stable-2te8jp
      root_path: ~/.bundle/dab_test/dev
    variables:
      py_lib_catalog: tenbosch
      py_lib_schema: app_dev
      app_name: dab-test-dev
      git_branch: main

  prod:
    mode: production
    workspace:
      host: https://fevm-classic-stable-2te8jp.cloud.databricks.com
      profile: fevm-classic-stable-2te8jp
      root_path: ~/.bundle/dab_test/prod
    variables:
      py_lib_catalog: tenbosch
      py_lib_schema: app_prod
      app_name: dab-test-prod
      git_branch: main
